version: '3.8'

services:
  nextjs-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nextjs-portfolio
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./:/app
    networks:
      - portfolio-network

  # Development service (optional - uncomment to use)
  # nextjs-dev:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.dev
  #   container_name: nextjs-portfolio-dev
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - NODE_ENV=development
  #   volumes:
  #     - .:/app
  #     - /app/node_modules
  #   networks:
  #     - portfolio-network

networks:
  portfolio-network:
    driver: bridge
